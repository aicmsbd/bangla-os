# Bangla OS neofetch config — installed to /etc/skel and live user
title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_shorthand="on"
ascii_distro="off"
ascii_overwrite="off"
ascii_colors=(2 1 2 1)
ascii_bold="on"
separator="─"
primary_color="2"
secondary_color="1"
info_color="2"
label_color="7"
block_range=(0 15)
color_range=(0 6)
cpu_display="off"
memory_display="on"
battery_display="off"
disk_display="on"
resolution="off"
de_version="on"
gtk_shorthand="on"
gtk2="on"
gtk3="on"
public_ip="off"
weather="off"
song_shorthand="on"
music_player="auto"
cpu_brand="off"
cpu_speed="off"
cpu_cores="off"
cpu_temp="off"
gpu_brand="on"
gpu_type="all"
gpu_colors=(2 1 2 1)
refresh_rate="off"
gtk_theme="on"
gtk_icons="on"
term_font="off"
term_size="off"
term_colors="off"
term_font_type="off"
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"
disk_group="on"
memory_percent="on"
memory_unit="mib"
swap_percent="off"
swap_unit="mib"
package_managers="off"
shell_version="on"
shell_path="off"
shell_login="off"
shell_parent="off"
bold="on"
underline_enabled="on"
underline_char="─"
underline_color="7"
bold="on"
alignment="left"
gap=3
image_backend="off"
image_source=""
